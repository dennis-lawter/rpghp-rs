services:
  db:
    hostname: db
    image: postgres:18.3-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db-data:/var/lib/postgresql
    ports:
      - "25432:5432"

  app:
    build:
      context: .
      args:
        SQLX_OFFLINE: true
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db-data:
  cargo-cache:
